<!DOCTYPE html>
<html>

<head>
    <title>React Basics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin-top: 0px;
            margin-bottom: 0px;

        }

        .app-container {
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;

            height: 100vh;
            display: flex;
            flex-direction: column;
            /* justify-content: ; */
        }

        .send-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            margin-left: 10px;
            cursor: pointer;
        }

        .chat-input {
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 10px;
            border-width: 1px;
            /* border: 2px solid gray; */
            flex-grow: 1;
        }

        .chat-input-container {
            display: flex;
            margin-bottom: 20px;
        }

        .chat-message-user {
            display: flex;
            justify-content: end;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .chat-message-bot {
            display: flex;
            justify-content: start;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .chat-messages-container {
            flex-grow: 1;
            margin-top: 20px;
            overflow: scroll;
            scrollbar-width: none;
            /* Ẩn scrollbar trên Firefox */
        }
    </style>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function ChatInput({ chatMessages, setChatMessages }) {
            const [inputText, setInputText] = React.useState("");

            function saveInputText(event) {
                setInputText(event.target.value);
            }

            function sendMessage() {
                const newChatMessages = [ // chỉ dựa vào chatMessage khi cập nhật state lần cập nhật thứ 2 (chatbot response) sẽ đè lên và làm mất lần cập nhật 1 (user message)
                    ...chatMessages, // spread operator: giúp sao chép tất cả phần tử của mảng chatMessages vào một mảng mới, sau đó thêm phần tử mới vào cuối mảng mới này
                    {
                        message: inputText,
                        sender: "user",
                        id: crypto.randomUUID() // tạo id ngẫu nhiên cho tin nhắn mới
                    }
                ]

                setChatMessages(newChatMessages);

                const response = Chatbot.getResponse(inputText);
                setChatMessages([
                    ...newChatMessages,
                    {
                        message: response,
                        sender: "bot",
                        id: crypto.randomUUID() // tạo id ngẫu nhiên cho tin nhắn mới
                    }
                ]);

                setInputText(""); // reset input text sau khi gửi tin nhắn
            }

            return (
                <div className="chat-input-container">
                    {/* Fragment syntax: allows us to return multiple elements without a wrapper div */}
                    <input
                        type="text"
                        placeholder="Type message here"
                        size="50"
                        className="chat-input"
                        onChange={saveInputText}
                        value={inputText} // controlled component: input text được điều khiển bởi state inputText, giá trị của input sẽ luôn đồng bộ với state
                    />
                    <button className="send-button" onClick={sendMessage}>Send</button>
                </div>
            );
        }

        function ChatMessage({ message, sender }) {
            // const message = props.message;
            // const sender = props.sender;
            // const { message, sender } = props; // Object destructuring syntax (React props shortcut)

            // if (sender === "bot") {
            //     return (
            //         <div> {/* Ở đây nên dùng div vì nó chiếm hết một dòng (100% chiều ngang), không cho phần tử khác nằm cùng hàng.*/}
            //             <img src="../image/as.jpg" width="50" /> 
            //             {message}
            //         </div>
            //     );
            // }

            return (
                <div className={
                    sender === "user"
                        ? "chat-message-user"
                        : "chat-message-bot"}
                > {/* Toán tử 3 ngôi (Ternary Operator)  */}
                    {sender === "bot" && (
                        <img
                            src="../image/as.jpg"
                            width="50"
                            style={{ borderRadius: "100%" }}
                        />
                    )} {/* Cách dùng if  */}
                    <div style={{ backgroundColor: "#f0f0f0", padding: "10px", borderRadius: "10px", maxWidth: "300px" }}>{message}</div>
                    {sender === "user" && (
                        <img
                            src="../image/494643591_1753766695542434_3806171540582182133_n.jpg"
                            width="50"
                            height="50"
                            style={{ borderRadius: "100%" }}
                        />)}
                </div>
            );

        }



        function ChatMessages({ chatMessages }) {
            const chatMessagesRef = React.useRef(null);
            React.useEffect(() => { // useEffect này sẽ thực hiện khi component này được tạo hoặc update
                const containerElement = chatMessagesRef.current; // lấy phần tử DOM của container chat messages thông qua ref
                if (containerElement) { // kiểm tra nếu phần tử DOM tồn tại
                    containerElement.scrollTop = containerElement.scrollHeight; // scrollTop: vị trí scroll hiện tại = scrollHeight: chiều cao toàn bộ nội dung bao gồm phần overflow
                }
            }, [chatMessages]) // []: chỉ chạy useEffect 1 lần khi component được tạo, không chạy lại khi component update
            // [chatMessages]: chạy useEffect mỗi khi chatMessages thay đổi (khi có tin nhắn mới được gửi hoặc nhận)
            return (
                <div
                    className="chat-messages-container"
                    ref={chatMessagesRef} // ref: lưu tham chiếu đến phần tử DOM của container chat messages
                >
                    {chatMessages.map((chatMessage) => {
                        return (
                            <ChatMessage
                                message={chatMessage.message}
                                sender={chatMessage.sender}
                                key={chatMessage.id} // key prop: giúp React xác định phần tử nào đã thay đổi, được thêm vào hoặc bị xóa, giúp tối ưu hóa hiệu suất khi render lại danh sách các phần tử
                            />
                        );
                    })}
                </div>);
        }

        function App() {
            const [chatMessages, setChatMessages] = React.useState([{
                message: "Hello chatbot",
                sender: "user",
                id: "id1"
            }, {
                message: "Hello, how are you?",
                sender: "bot",
                id: "id2"
            }, {
                message: "Can you help me?",
                sender: "user",
                id: "id3"
            }, {
                message: "Yes, I can help you.",
                sender: "bot",
                id: "id4"
            }]); // useState sẽ trả về 2 phần tử  trong một mảng state (giá trị hiện tại) và setState (hàm cập nhật)

            // const chatMessages = array[0]; // array[0] là giá trị hiện tại của state gồm một mảng các tin nhắn (chatMessages)
            // const setChatMessages = array[1]; //  array[1] là hàm để cập nhật state (setChatMessages) 

            return (
                <div className="app-container">

                    <ChatMessages
                        chatMessages={chatMessages} // Name convention là props có cùng tên với state sẽ dễ hiểu hơn, nhưng không bắt buộc phải giống nhau
                    />
                    <ChatInput
                        chatMessages={chatMessages}
                        setChatMessages={setChatMessages}
                    />
                </div>
            );
        }



        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>

</html>
